name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up npm for trusted publishing
        run: npm install -g npm@11

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run smoke workflow
        run: npm run smoke

      - name: Check package contents
        run: npm run pack:check

      - name: Verify tag matches package version
        run: |
          node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); const tag = process.env.TAG_NAME; const expected = "v" + pkg.version; if (tag !== expected) { console.error("Release tag " + tag + " does not match package version " + pkg.version + "; expected " + expected + "."); process.exit(1); }'
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Publish package
        run: npm publish
