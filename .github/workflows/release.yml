name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up npm for trusted publishing
        run: npm install -g npm@11

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run smoke workflow
        run: npm run smoke

      - name: Check package contents
        run: npm run pack:check

      - name: Verify tag matches package version
        run: |
          node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); const tag = process.env.TAG_NAME; const expected = "v" + pkg.version; if (tag !== expected) { console.error("Release tag " + tag + " does not match package version " + pkg.version + "; expected " + expected + "."); process.exit(1); }'
        env:
          TAG_NAME: ${{ inputs.tag }}

      - name: Publish package
        run: npm publish --provenance

      - name: Verify npm provenance
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const spec = `${pkg.name}@${pkg.version}`;
          const raw = execFileSync("npm", ["view", spec, "dist", "--json"], { encoding: "utf8" });
          const dist = JSON.parse(raw);
          const serialized = JSON.stringify(dist).toLowerCase();
          if (!serialized.includes("attestation") && !serialized.includes("provenance")) {
            console.error(`No npm provenance metadata found for ${spec}.`);
            process.exit(1);
          }
          console.log(`Verified npm provenance metadata for ${spec}.`);
          NODE
